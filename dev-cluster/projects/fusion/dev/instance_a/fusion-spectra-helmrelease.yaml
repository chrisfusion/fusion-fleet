apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: fusion-spectra
  namespace: fusion-dev-a
spec:
  interval: 1m
  releaseName: fusion-spectra
  install:
    createNamespace: true
  chart:
    spec:
      chart: ./deployment
      sourceRef:
        kind: GitRepository
        name: fusion-spectra-main
        namespace: flux-system
      valuesFiles:
        - values.yaml
        - values-dev.yaml
