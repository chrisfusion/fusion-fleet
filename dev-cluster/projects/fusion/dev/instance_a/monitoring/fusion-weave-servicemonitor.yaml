apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: fusion-weave-api
  namespace: fusion-dev-a
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: fusion-weave
      app.kubernetes.io/instance: fusion-weave
  namespaceSelector:
    matchNames:
      - fusion-dev-a
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
