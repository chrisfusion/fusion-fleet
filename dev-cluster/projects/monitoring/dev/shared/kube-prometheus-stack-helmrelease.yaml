apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 1m
  releaseName: kube-prometheus-stack
  install:
    createNamespace: false
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: kube-prometheus-stack
      version: ">=61.0.0 <62.0.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  values:
    # minikube dev tuning — these control-plane components aren't reliably
    # scrapeable on minikube and just generate noisy "down" targets.
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeEtcd:
      enabled: false
    kubeProxy:
      enabled: false

    prometheus:
      prometheusSpec:
        serviceMonitorSelectorNilUsesHelmValues: false
        serviceMonitorNamespaceSelector: {}
        podMonitorSelectorNilUsesHelmValues: false
        podMonitorNamespaceSelector: {}

    # kube-state-metrics drops all pod labels from kube_pod_labels by default — allow-list:
    #   - the three weave labels every job/deploy step pod carries (jobbuilder.go +
    #     deploybuilder.go, fusion-flux/internal/{jobbuilder,deploybuilder}/builder.go), so the
    #     "chains/jobs/apps" status panel can identify weave-managed pods independently of forge
    #     build pods (which never carry these labels)
    #   - the forge build-job label every CIBuild pod carries (fusion-forge/internal/jobbuilder/
    #     jobbuilder.go labelBuildIDKey), so the "forge job" status panel can identify build pods
    #     independently of weave pods (which never carry this label)
    kube-state-metrics:
      metricLabelsAllowlist:
        - "pods=[fusion-platform.io/chain,fusion-platform.io/step,fusion-platform.io/run,build.fusion-platform.io/cibuild]"

    grafana:
      # Dev-only credential — never use this value in production.
      adminPassword: "fusion-dev-admin"
      ingress:
        enabled: true
        ingressClassName: nginx
        hosts:
          - grafana.fusion.local
      sidecar:
        dashboards:
          enabled: true
          searchNamespace: ALL
          label: grafana_dashboard
          labelValue: "1"
          folderAnnotation: grafana_folder
