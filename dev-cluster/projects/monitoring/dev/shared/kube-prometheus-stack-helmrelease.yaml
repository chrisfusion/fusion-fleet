apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 1m
  releaseName: kube-prometheus-stack
  install:
    createNamespace: false
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: kube-prometheus-stack
      version: ">=61.0.0 <62.0.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  values:
    # minikube dev tuning — these control-plane components aren't reliably
    # scrapeable on minikube and just generate noisy "down" targets.
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeEtcd:
      enabled: false
    kubeProxy:
      enabled: false

    prometheus:
      prometheusSpec:
        serviceMonitorSelectorNilUsesHelmValues: false
        serviceMonitorNamespaceSelector: {}
        podMonitorSelectorNilUsesHelmValues: false
        podMonitorNamespaceSelector: {}

    grafana:
      # Dev-only credential — never use this value in production.
      adminPassword: "fusion-dev-admin"
      ingress:
        enabled: true
        ingressClassName: nginx
        hosts:
          - grafana.fusion.local
      sidecar:
        dashboards:
          enabled: true
          searchNamespace: ALL
          label: grafana_dashboard
          labelValue: "1"
          folderAnnotation: grafana_folder
